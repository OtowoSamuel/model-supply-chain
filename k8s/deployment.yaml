apiVersion: v1
kind: Namespace
metadata:
  name: ml-staging
  labels:
    environment: staging
    security-policy: enforced

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-server
  namespace: ml-staging
  labels:
    app.kubernetes.io/name: model-server
    app.kubernetes.io/component: ml-model
    app.kubernetes.io/version: "1.0.0"
    ml.model/framework: scikit-learn
    ml.model/type: RandomForestClassifier
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: model-server
  template:
    metadata:
      labels:
        app: model-server
        app.kubernetes.io/name: model-server
        app.kubernetes.io/component: ml-model
      annotations:
        # Attestation references (populated by CI/CD)
        ml.model/sha256: "PLACEHOLDER_MODEL_SHA"
        ml.model/sbom-ref: "PLACEHOLDER_SBOM_REF"
        ml.model/provenance-ref: "PLACEHOLDER_PROVENANCE_REF"
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      
      containers:
      - name: model-server
        image: ghcr.io/yourusername/model-server:latest
        imagePullPolicy: Always
        
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false  # Model needs to load artifacts
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL
        
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        
        env:
        - name: MODEL_PATH
          value: "/app/artifacts/model.pkl"
        - name: VERIFY_SIGNATURE
          value: "true"
        - name: VERIFY_ATTESTATION
          value: "true"
        
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        
        volumeMounts:
        - name: cosign-public-key
          mountPath: /app/keys
          readOnly: true
      
      volumes:
      - name: cosign-public-key
        secret:
          secretName: cosign-public-key
          optional: true

---
apiVersion: v1
kind: Service
metadata:
  name: model-server
  namespace: ml-staging
  labels:
    app: model-server
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: model-server

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: model-server-netpol
  namespace: ml-staging
spec:
  podSelector:
    matchLabels:
      app: model-server
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          environment: staging
    ports:
    - protocol: TCP
      port: 8080
  egress:
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 53  # DNS
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443  # HTTPS for verification
