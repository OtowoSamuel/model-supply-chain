name: Model Supply Chain Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/model-server

jobs:
  train-and-attest:
    name: Train Model with Provenance
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # For cosign keyless signing
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      
      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: '3.11'  # Use stable version (not 3.14)
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Install Cosign
        uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0
      
      - name: Install Syft (for SBOM)
        uses: anchore/sbom-action/download-syft@42d4bae1c66c5a5eb03929f30cbb8a1d5aa09087 # v0.18.2
      
      - name: Train model
        env:
          BUILD_ID: ${{ github.run_id }}
          BUILDER_ID: github-actions
          GIT_REPO: ${{ github.repository }}
          GIT_COMMIT: ${{ github.sha }}
        run: |
          python src/train_model.py
      
      - name: Generate SBOMs
        run: |
          python src/generate_sbom.py artifacts/metadata.json
          
          # Also generate SBOM for container
          syft dir:. -o cyclonedx-json > artifacts/sbom/container-sbom.json
      
      - name: Sign artifacts with Cosign (keyless)
        env:
          COSIGN_EXPERIMENTAL: 1
        run: |
          # Sign model
          cosign sign-blob artifacts/model.pkl \
            --bundle artifacts/model.pkl.bundle \
            --yes
          
          # Sign SBOMs
          cosign sign-blob artifacts/sbom/code-sbom.json \
            --bundle artifacts/sbom/code-sbom.json.bundle \
            --yes
          
          cosign sign-blob artifacts/sbom/model-sbom.json \
            --bundle artifacts/sbom/model-sbom.json.bundle \
            --yes
      
      - name: Create SLSA attestation
        env:
          COSIGN_EXPERIMENTAL: 1
        run: |
          cosign attest-blob artifacts/model.pkl \
            --predicate artifacts/attestations/provenance.json \
            --type https://slsa.dev/provenance/v0.2 \
            --yes > artifacts/model.pkl.att
      
      - name: Upload artifacts
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5.0
        with:
          name: model-artifacts
          path: |
            artifacts/
            !artifacts/**/*.pkl
          retention-days: 90
      
      - name: Upload model (separate)
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5.0
        with:
          name: model-binary
          path: artifacts/model.pkl
          retention-days: 90

  security-scan:
    name: Security Scanning
    needs: train-and-attest
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: model-artifacts
          path: artifacts/
      
      - name: Scan dependencies with pip-audit
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --format json > artifacts/vulnerability-report.json
      
      - name: Scan SBOMs with Grype
        continue-on-error: true
        run: |
          # Install Grype
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
          
          # Update Grype database
          grype db update
          
          # Scan Python dependencies directly (not SBOM)
          grype dir:. --only-fixed --fail-on high
      
      - name: Upload security reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: artifacts/vulnerability-report.json

  policy-gate:
    name: Policy Enforcement Gate
    needs: [train-and-attest, security-scan]
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      
      - name: Download artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: model-artifacts
          path: artifacts/
      
      - name: Setup OPA
        uses: open-policy-agent/setup-opa@34a30e8a924d1b03ce2cf7abe97250bbb1f332b5 # v2.2.0
        with:
          version: latest
      
      - name: Evaluate deployment policy
        run: |
          python policies/test_policy.py artifacts
      
      - name: Policy gate passed
        run: |
          echo "✅ Model passed all policy checks"
          echo "   - Signature verified"
          echo "   - SBOMs present"
          echo "   - SLSA provenance valid"
          echo "   - Quality threshold met"

  build-container:
    name: Build and Sign Container
    needs: policy-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      
      - name: Download model
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: model-binary
          path: artifacts/
      
      - name: Download artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: model-artifacts
          path: artifacts/
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318e26f7ab63c281c1d6c7e9c54c4c87f # v3.9.0
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@8e5442c4ef9f78752691e2d8f8d19755c6f78e81 # v5.5.1
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix={{branch}}-
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
      
      - name: Build and push
        id: build
        uses: docker/build-push-action@471d1c66eadb9bfec48f46a8dde5d4abc72c44a8 # v6.13.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=image,name=target,annotation-index.org.opencontainers.image.description=Model supply chain server
      
      - name: Get image digest
        id: digest
        run: |
          echo "digest=${{ steps.build.outputs.digest }}" >> $GITHUB_OUTPUT
          echo "Image digest: ${{ steps.build.outputs.digest }}"
      
      - name: Install Cosign
        uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0
      
      - name: Sign container image
        env:
          COSIGN_EXPERIMENTAL: 1
        run: |
          # Sign using the first tag (more reliable than digest)
          IMAGE_TAG=$(echo '${{ steps.meta.outputs.tags }}' | head -n1)
          echo "Signing image: $IMAGE_TAG"
          cosign sign --yes "$IMAGE_TAG"
          
          # Also verify we can reference by digest
          IMAGE_DIGEST="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.digest.outputs.digest }}"
          echo "Image also available at: $IMAGE_DIGEST"
      
      - name: Attest SBOM to container
        env:
          COSIGN_EXPERIMENTAL: 1
        run: |
          IMAGE_TAG=$(echo '${{ steps.meta.outputs.tags }}' | head -n1)
          echo "Attesting SBOM to: $IMAGE_TAG"
          cosign attest --yes \
            --predicate artifacts/sbom/container-sbom.json \
            --type cyclonedx \
            "$IMAGE_TAG"
      
      - name: Verify image signature
        env:
          COSIGN_EXPERIMENTAL: 1
        run: |
          IMAGE_TAG=$(echo '${{ steps.meta.outputs.tags }}' | head -n1)
          echo "Verifying image: $IMAGE_TAG"
          cosign verify "$IMAGE_TAG" \
            --certificate-identity-regexp='https://github.com/${{ github.repository_owner }}' \
            --certificate-oidc-issuer=https://token.actions.githubusercontent.com

  deploy-staging:
    name: Deploy to Staging
    needs: build-container
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: staging
    
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      
      # Uncomment and configure when you have a K8s cluster
      # - name: Configure kubectl
      #   uses: azure/k8s-set-context@v3
      #   with:
      #     method: kubeconfig
      #     kubeconfig: ${{ secrets.KUBE_CONFIG }}
      
      - name: Deploy to Kubernetes
        run: |
          echo "🚀 Ready to deploy to staging with policy enforcement"
          echo "   Kyverno will verify signatures and attestations"
          echo ""
          echo "To enable actual deployment:"
          echo "1. Set up a Kubernetes cluster"
          echo "2. Add KUBE_CONFIG secret to GitHub"
          echo "3. Uncomment kubectl commands above"
          echo "4. Run: kubectl apply -f k8s/deployment.yaml"
          
          # Uncomment when ready:
          # kubectl apply -f k8s/deployment.yaml
